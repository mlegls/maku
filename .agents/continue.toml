# harness-continue (~/dev/harness-continue): while armed (hc on/off, sticky),
# the agent auto-continues whenever the stop condition is false. Default:
#   ((git-clean | tracking-uncertain) & (tests | test-decision) & openspec-tasks) | plan-flawed
# (tracking-uncertain/test-decision/plan-flawed are built-in llm exceptions)
max_continues = 8

[conditions.tests]
type = "test-suite"
framework = "cargo"
cwd = "proto"
timeout = 900

# Oracle card suites (the release gate for perf/lowering changes) are too
# heavy to run on every stop; keep them as an explicit task in the change.
