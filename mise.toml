# Project toolchain. Global runtimes live in ~/.config/mise/config.toml;
# everything the build and the OpenSpec workflow need is pinned here.
[tools]
rust = { version = "stable", targets = "wasm32-unknown-unknown" }
bun = "latest"
node = "24"
"cargo:wasm-pack" = "latest"
"npm:@fission-ai/openspec" = "latest"

[tasks.test]
description = "Core release test suite"
run = "cargo test --release --manifest-path crates/core/Cargo.toml"

[tasks.test-oracle]
description = "Unit + card suites under the lowering oracle (MAKU_LOWER_ORACLE=1)"
run = [
  "MAKU_LOWER_ORACLE=1 cargo test --release --manifest-path crates/core/Cargo.toml",
  "MAKU_LOWER_ORACLE=1 cargo test --release --manifest-path crates/core/Cargo.toml -- --ignored",
]

[tasks.test-mesh]
description = "Touhou mesh crate tests"
run = "cargo test --release -p maku-mesh-touhou --manifest-path crates/Cargo.toml"

[tasks.web]
description = "Build the wasm package and editor bundle"
run = "crates/web/build.sh"

[tasks.serve]
description = "Build and serve the web host on :8000"
run = "crates/web/build.sh serve"
