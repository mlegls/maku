name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: Run the complete release/oracle lane
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native player prerequisites
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgl1-mesa-dev libx11-dev libxi-dev pkg-config
      - uses: jdx/mise-action@v3
        with:
          cache: true
      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile
      - name: Install benchmark browser
        run: bunx playwright install --with-deps chromium
      - name: Fast validation
        run: scripts/check.sh fast

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install native player prerequisites
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgl1-mesa-dev libx11-dev libxi-dev pkg-config
      - uses: jdx/mise-action@v3
        with:
          cache: true
      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile
      - name: Install benchmark browser
        run: bunx playwright install --with-deps chromium
      - name: Complete release validation
        run: scripts/check.sh release
