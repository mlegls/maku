schema: spec-driven

context: |
  Maku: a deterministic 2D danmaku (bullet-pattern) language + engine
  prototype. Rust workspace at crates/ (core, player, mesh-touhou);
  cards (programs) in cards/. Decision homes: openspec/specs/ capability
  specs are the settled-truth authority (language semantics live in
  specs/language, lowering invariants in specs/lowering, etc.); target
  designs live as design.md inside their backlog change; docs/ is
  user-facing only.

  Standing constraints every change must respect:
  - Bit-exact determinism across lowering tiers: the compiled/lowered
    form must match the interpreter (same op order, same libm, no
    fast-math). Replay/scrub and the lowering oracle depend on it.
  - Oracle gating: MAKU_LOWER_ORACLE=1 runs every lowered program
    against the interpreter; perf/lowering changes must pass the core
    unit suite plus the 4 ignored oracle card suites
    (cargo test --release -- --ignored) before landing.
  - No sugar in lang: the core surface is a semantic kernel; vocabulary
    is lib macros over it. Optimization recognizes macro EXPANSION
    SHAPES (post-expansion AST patterns), never names.
  - Hot-enum size guard: DynNode must stay <= 96 bytes (test-pinned);
    new per-variant data goes behind Option<Rc<..>> (one word).
  - Mixed numeric width is the contract: control plane f64, hot columns
    f32 (planned) — not blanket f64.
  - Scale target: ~10k live bullets is the normal state; 100k-1M is the
    design ceiling, web host included.
  - Perf methodology (openspec/specs/perf/spec.md): wall-only
    interleaved A/B runs for deltas; macOS sample is attribution ground
    truth; profiled walls can mask regressions.
  - Process: commit each coherent change-set immediately; rounds are
    user-initiated, but once agreed, run to completion without
    intermediate approval requests; tutorials teach Maku directly
    (DMK comparisons only in docs/from-dmk.md). Write design/status
    prose like a lab notebook — no status ceremonies or checkmark
    theater.

rules:
  proposal:
    - Cite governing capability specs (openspec/specs/<name>/spec.md) or
      the owning change's design.md by path; do not restate their
      decision content.
